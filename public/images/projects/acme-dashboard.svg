<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <!-- Background -->
  <rect width="1200" height="750" fill="#f5f5f4"/>

  <!-- Subtle grid pattern suggesting a dashboard layout -->
  <!-- Top row: 3 metric cards -->
  <rect x="120" y="140" width="280" height="160" rx="8" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="460" y="140" width="280" height="160" rx="8" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="800" y="140" width="280" height="160" rx="8" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>

  <!-- Small bar indicators inside cards -->
  <rect x="150" y="230" width="60" height="4" rx="2" fill="#c4c1bd"/>
  <rect x="150" y="242" width="100" height="4" rx="2" fill="#e7e5e4"/>
  <rect x="490" y="230" width="80" height="4" rx="2" fill="#c4c1bd"/>
  <rect x="490" y="242" width="90" height="4" rx="2" fill="#e7e5e4"/>
  <rect x="830" y="230" width="50" height="4" rx="2" fill="#c4c1bd"/>
  <rect x="830" y="242" width="110" height="4" rx="2" fill="#e7e5e4"/>

  <!-- Bottom row: chart area -->
  <rect x="120" y="340" width="620" height="270" rx="8" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="800" y="340" width="280" height="270" rx="8" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>

  <!-- Simple bar chart silhouette in the main chart area -->
  <rect x="180" y="500" width="40" height="60" rx="3" fill="#e7e5e4"/>
  <rect x="240" y="470" width="40" height="90" rx="3" fill="#d6d3d1"/>
  <rect x="300" y="440" width="40" height="120" rx="3" fill="#e7e5e4"/>
  <rect x="360" y="460" width="40" height="100" rx="3" fill="#d6d3d1"/>
  <rect x="420" y="420" width="40" height="140" rx="3" fill="#e7e5e4"/>
  <rect x="480" y="390" width="40" height="170" rx="3" fill="#d6d3d1"/>
  <rect x="540" y="410" width="40" height="150" rx="3" fill="#e7e5e4"/>
  <rect x="600" y="380" width="40" height="180" rx="3" fill="#d6d3d1"/>

  <!-- Sidebar list items in right panel -->
  <rect x="830" y="390" width="120" height="4" rx="2" fill="#d6d3d1"/>
  <rect x="830" y="404" width="80" height="4" rx="2" fill="#e7e5e4"/>
  <rect x="830" y="430" width="140" height="4" rx="2" fill="#d6d3d1"/>
  <rect x="830" y="444" width="100" height="4" rx="2" fill="#e7e5e4"/>
  <rect x="830" y="470" width="110" height="4" rx="2" fill="#d6d3d1"/>
  <rect x="830" y="484" width="90" height="4" rx="2" fill="#e7e5e4"/>
  <rect x="830" y="510" width="130" height="4" rx="2" fill="#d6d3d1"/>
  <rect x="830" y="524" width="70" height="4" rx="2" fill="#e7e5e4"/>

  <!-- Top nav hint -->
  <line x1="120" y1="100" x2="1080" y2="100" stroke="#e7e5e4" stroke-width="1"/>
  <circle cx="150" cy="80" r="12" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="180" y="76" width="80" height="4" rx="2" fill="#d6d3d1"/>
</svg>
