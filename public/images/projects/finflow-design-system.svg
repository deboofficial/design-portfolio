<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <!-- Background -->
  <rect width="1200" height="750" fill="#f5f5f4"/>

  <!-- Component blocks arranged in a system grid -->

  <!-- Row 1: Button components -->
  <rect x="100" y="120" width="160" height="50" rx="8" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="120" y="138" width="60" height="5" rx="2.5" fill="#d6d3d1"/>
  <text x="100" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">BUTTON</text>

  <rect x="300" y="120" width="160" height="50" rx="8" fill="#edebe9" stroke="#d6d3d1" stroke-width="1"/>
  <rect x="340" y="138" width="80" height="5" rx="2.5" fill="#c4c1bd"/>
  <text x="300" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">BUTTON FILLED</text>

  <rect x="500" y="120" width="120" height="50" rx="25" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="530" y="140" width="60" height="4" rx="2" fill="#d6d3d1"/>
  <text x="500" y="108" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">PILL</text>

  <!-- Row 2: Input components -->
  <rect x="100" y="240" width="240" height="44" rx="6" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="116" y="256" width="80" height="4" rx="2" fill="#e7e5e4"/>
  <text x="100" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">TEXT INPUT</text>

  <rect x="380" y="240" width="240" height="44" rx="6" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="396" y="256" width="120" height="4" rx="2" fill="#d6d3d1"/>
  <rect x="588" y="248" width="20" height="20" rx="3" fill="none" stroke="#e7e5e4" stroke-width="1"/>
  <text x="380" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">SEARCH</text>

  <!-- Row 3: Card components -->
  <rect x="100" y="360" width="280" height="180" rx="10" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="100" y="360" width="280" height="80" rx="10" fill="#edebe9"/>
  <rect x="100" y="430" width="280" height="0" stroke="#edebe9" stroke-width="0"/>
  <rect x="120" y="460" width="140" height="5" rx="2.5" fill="#d6d3d1"/>
  <rect x="120" y="474" width="200" height="4" rx="2" fill="#e7e5e4"/>
  <rect x="120" y="486" width="160" height="4" rx="2" fill="#e7e5e4"/>
  <rect x="120" y="510" width="70" height="5" rx="2.5" fill="#c4c1bd"/>
  <text x="100" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">CARD</text>

  <!-- Row 3: Toggle and checkbox -->
  <rect x="440" y="360" width="44" height="24" rx="12" fill="#e7e5e4"/>
  <circle cx="460" cy="372" r="9" fill="white"/>
  <text x="440" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">TOGGLE</text>

  <rect x="440" y="420" width="18" height="18" rx="4" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="468" y="425" width="60" height="4" rx="2" fill="#d6d3d1"/>
  <text x="440" y="408" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">CHECKBOX</text>

  <circle cx="452" cy="486" r="9" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <rect x="468" y="482" width="60" height="4" rx="2" fill="#d6d3d1"/>
  <text x="440" y="474" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">RADIO</text>

  <!-- Color swatches -->
  <circle cx="700" cy="160" r="28" fill="#e7e5e4" stroke="#d6d3d1" stroke-width="1"/>
  <circle cx="770" cy="160" r="28" fill="#d6d3d1" stroke="#c4c1bd" stroke-width="1"/>
  <circle cx="840" cy="160" r="28" fill="#c4c1bd" stroke="#a8a29e" stroke-width="1"/>
  <circle cx="910" cy="160" r="28" fill="#a8a29e" stroke="#78716c" stroke-width="1"/>
  <text x="700" y="114" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">COLOR TOKENS</text>

  <!-- Typography scale -->
  <rect x="700" y="240" width="200" height="6" rx="3" fill="#c4c1bd"/>
  <rect x="700" y="264" width="160" height="5" rx="2.5" fill="#d6d3d1"/>
  <rect x="700" y="284" width="140" height="4" rx="2" fill="#d6d3d1"/>
  <rect x="700" y="302" width="120" height="3.5" rx="1.75" fill="#e7e5e4"/>
  <rect x="700" y="318" width="100" height="3" rx="1.5" fill="#e7e5e4"/>
  <text x="700" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">TYPE SCALE</text>

  <!-- Spacing scale -->
  <rect x="700" y="380" width="8" height="40" rx="2" fill="#e7e5e4"/>
  <rect x="720" y="380" width="16" height="40" rx="2" fill="#e7e5e4"/>
  <rect x="748" y="380" width="24" height="40" rx="2" fill="#e7e5e4"/>
  <rect x="784" y="380" width="32" height="40" rx="2" fill="#e7e5e4"/>
  <rect x="828" y="380" width="48" height="40" rx="2" fill="#e7e5e4"/>
  <rect x="888" y="380" width="64" height="40" rx="2" fill="#e7e5e4"/>
  <text x="700" y="368" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">SPACING</text>

  <!-- Table component hint -->
  <rect x="700" y="470" width="400" height="160" rx="8" fill="none" stroke="#d6d3d1" stroke-width="1.5"/>
  <line x1="700" y1="500" x2="1100" y2="500" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="700" y1="530" x2="1100" y2="530" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="700" y1="560" x2="1100" y2="560" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="700" y1="590" x2="1100" y2="590" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="850" y1="470" x2="850" y2="630" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="970" y1="470" x2="970" y2="630" stroke="#e7e5e4" stroke-width="1"/>
  <rect x="720" y="480" width="50" height="4" rx="2" fill="#c4c1bd"/>
  <rect x="870" y="480" width="40" height="4" rx="2" fill="#c4c1bd"/>
  <rect x="990" y="480" width="60" height="4" rx="2" fill="#c4c1bd"/>
  <text x="700" y="458" font-family="system-ui, sans-serif" font-size="10" fill="#a8a29e" letter-spacing="1">TABLE</text>
</svg>
